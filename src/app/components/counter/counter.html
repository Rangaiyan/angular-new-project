<div class="counter-card">
    <p class="counter-value">counter Value: {{counterValue()}}</p>
    <div class="button-group">
        <button class="btn btn-primary" (click)="increament()">Increment</button>
        <button class="btn btn-secondary" (click)="decreament()">Decrement</button>
        <button class="btn btn-outline" (click)="reset()">Reset</button>
    </div>
</div>
